<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Dice Pool</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0b0d16;
            --bg-panel: #151926;
            --bg-item: #1f2538;
            --border-color: #242b42;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --dice-bg: #1e2336;
            --dice-border: #333f5c;
            --button-bg: #ffffff;
            --button-text: #0b0d16;
            --bg-opacity: 0.15;
            --accent-color: #ff0055;
        }

        [data-theme="black"] {
            --bg-body: #0a0a0c; --bg-panel: #141417; --bg-item: #1f1f24; --border-color: #2b2b33;
            --text-main: #ffffff; --text-muted: #71717a; --dice-bg: #1f1f24; --dice-border: #3f3f46;
            --button-bg: #ffffff; --button-text: #0a0a0c; --bg-opacity: 0.18;
        }

        body {
            font-family: 'Fredoka', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        .elephant-wallpaper {
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: url('https://i.postimg.co/6qLhMbyr/strawberry-elephant-transparent.png');
            background-size: 200px 200px; background-repeat: repeat;
            opacity: var(--bg-opacity); z-index: -1; pointer-events: none;
            animation: diagonalScroll 35s linear infinite;
        }

        @keyframes diagonalScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-200px, -200px); }
        }

        .settings-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            z-index: 10;
            width: 100%;
            max-width: 600px;
        }

        .config-box {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            background-color: var(--bg-panel);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .dropdown-wrapper {
            position: relative;
            display: inline-block;
        }

        .theme-dropdown {
            background-color: var(--bg-item);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 30px 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Fredoka', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            appearance: none;
        }

        /* SECRET DRAGGABLE RIGGER OVERLAY */
        .secret-rigger-container {
            display: none; 
            flex-direction: column;
            gap: 12px;
            padding: 0 16px 16px 16px;
            background-color: #0b0d16f2;
            border: 2px solid var(--accent-color);
            border-radius: 16px;
            width: 340px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 15px rgba(255, 0, 85, 0.3);
            position: fixed;
            z-index: 9999;
            user-select: none;
        }

        .rigger-drag-header {
            padding: 12px 0;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #242b42;
            width: 100%;
            margin-bottom: 8px;
        }

        .rigger-drag-title {
            color: var(--accent-color);
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rigger-drag-title::before, .rigger-drag-title::after {
            content: "•••"; opacity: 0.5; letter-spacing: -1px;
        }

        .rigger-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            width: 100%;
        }

        .rigger-label {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .blacklist-selectors {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            width: 100%;
        }

        .blacklist-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background-color: #1f2538;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .blacklist-btn.blocked {
            opacity: 0.25;
            border-color: var(--accent-color);
            text-decoration: line-through;
        }

        h1 {
            font-size: 2.2rem; margin-bottom: 20px; font-weight: 700;
            letter-spacing: 0.02em; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); z-index: 10;
        }

        .color-pool-label {
            font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); margin-bottom: 12px; font-weight: 700; z-index: 10;
        }

        .color-pool {
            display: flex; gap: 12px; background: var(--bg-panel); padding: 14px 24px;
            border-radius: 40px; border: 3px solid var(--border-color); margin-bottom: 40px;
            box-shadow: 0 6px 0px rgba(0,0,0,0.4); flex-wrap: wrap; justify-content: center; z-index: 10;
        }

        .pool-item {
            display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 700;
            background: var(--bg-item); padding: 8px 16px; border-radius: 25px; border: 2px solid var(--border-color);
        }

        .color-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }

        .dice-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px;
            max-width: 380px; width: 100%; margin-bottom: 40px; z-index: 10;
        }

        @media (min-width: 450px) {
            .dice-grid { grid-template-columns: repeat(4, 1fr); max-width: 680px; }
        }

        .die-box { display: flex; flex-direction: column; align-items: center; }

        .dice {
            width: 110px; height: 110px; background-color: var(--dice-bg); border: 4px solid var(--dice-border);
            border-radius: 35px; display: flex; align-items: center; justify-content: center; font-size: 3rem;
            font-weight: 700; color: var(--text-muted); box-shadow: 0 8px 0px rgba(0,0,0,0.4);
            transition: transform 0.1s, background-color 0.4s, box-shadow 0.4s, color 0.4s, border-color 0.3s; user-select: none;
        }

        .die-label {
            margin-top: 12px; font-size: 1.1rem; font-weight: 700; min-height: 20px;
            color: #ffffff !important; text-shadow: 1px 1px 3px rgba(0,0,0,0.8), 0 0 4px rgba(0,0,0,0.5);
        }

        .rolling { animation: bubbleTumble 0.5s ease-in-out; }

        @keyframes bubbleTumble {
            0% { transform: scale(0.85) rotate(0deg); }
            30% { transform: scale(1.2) rotate(-60deg); }
            70% { transform: scale(1.1) rotate(420deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        .roll-btn {
            padding: 18px 60px; font-size: 1.5rem; font-weight: 700; font-family: 'Fredoka', sans-serif;
            background: var(--button-bg); color: var(--button-text); border: 4px solid transparent;
            border-radius: 40px; cursor: pointer; box-shadow: 0 8px 0px rgba(0,0,0,0.4); transition: all 0.1s ease; z-index: 10;
        }
    </style>
</head>
<body data-theme="black">

    <div class="elephant-wallpaper"></div>

    <div class="settings-header">
        <div class="config-box">
            <label for="theme-select">Theme:</label>
            <div class="dropdown-wrapper">
                <select id="theme-select" class="theme-dropdown" onchange="setTheme(this.value)">
                    <option value="black">Black</option>
                </select>
            </div>
        </div>
    </div>

    <div class="secret-rigger-container" id="master-rig-panel">
        <div class="rigger-drag-header" id="panel-drag-handle">
            <div class="rigger-drag-title">Control Utility</div>
        </div>
        <div class="rigger-row" style="border-bottom: 1px solid #242b42; padding-bottom: 12px; margin-bottom: 4px;">
            <span class="rigger-label">Force All Dice:</span>
            <div class="dropdown-wrapper" style="width: 100%;">
                <select id="force-select" class="theme-dropdown" style="border-color: var(--accent-color); color: #fff; width: 100%; box-sizing: border-box;">
                    <option value="random">Disabled (Fair Random)</option>
                    <option value="0">Force Black (1)</option>
                    <option value="1">Force Blue (2)</option>
                    <option value="2">Force Green (3)</option>
                    <option value="3">Force Purple (4)</option>
                    <option value="4">Force Red (5)</option>
                    <option value="5">Force White (6)</option>
                </select>
            </div>
        </div>
        <div class="rigger-row">
            <span class="rigger-label">Exclusion Filters:</span>
            <div class="blacklist-selectors" id="blacklist-btn-container"></div>
        </div>
    </div>

    <h1>Color Dice Roller</h1>
    <div class="color-pool-label">Possible Dice Results</div>
    <div class="color-pool" id="pool-legend"></div>
    
    <div class="dice-grid">
        <div class="die-box"><div class="dice" id="die-0">?</div><div class="die-label" id="label-0"></div></div>
        <div class="die-box"><div class="dice" id="id-1">?</div><div class="die-label" id="label-1"></div></div>
        <div class="die-box"><div class="dice" id="id-2">?</div><div class="die-label" id="label-2"></div></div>
        <div class="die-box"><div class="dice" id="id-3">?</div><div class="die-label" id="label-3"></div></div>
    </div>
    
    <button class="roll-btn" onclick="rollAllDice()">Roll All</button>

    <script>
        const diceOutcomes = [
            { number: 1, name: "Black", bg: "#1a1a24", text: "#ffffff", active: true },
            { number: 2, name: "Blue", bg: "#0070f3", text: "#ffffff", active: true },
            { number: 3, name: "Green", bg: "#00df61", text: "#0b0d16", active: true },
            { number: 4, name: "Purple", bg: "#7928ca", text: "#ffffff", active: true },
            { number: 5, name: "Red", bg: "#ff0055", text: "#ffffff", active: true },
            { number: 6, name: "White", bg: "#ffffff", text: "#0b0d16", active: true }
        ];

        const legendContainer = document.getElementById('pool-legend');
        diceOutcomes.forEach(item => {
            const div = document.createElement('div');
            div.className = 'pool-item';
            div.innerHTML = `<span class="color-dot" style="background-color: ${item.bg};"></span> ${item.name}`;
            legendContainer.appendChild(div);
        });

        const buttonsContainer = document.getElementById('blacklist-btn-container');
        diceOutcomes.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'blacklist-btn';
            btn.style.color = item.bg;
            btn.innerHTML = `<span class="color-dot" style="background-color: ${item.bg};"></span> ${item.name}`;
            btn.onclick = () => {
                if (item.active && diceOutcomes.filter(o => o.active).length <= 1) return;
                item.active = !item.active;
                btn.classList.toggle('blocked', !item.active);
            };
            buttonsContainer.appendChild(btn);
        });

        // --- KEY LISTENER FOR "RIG" ---
        let inputSequence = "";
        const targetSequence = "rig";
        const secretPassword = "1234";
        const panel = document.getElementById('master-rig-panel');

        window.addEventListener('keydown', (e) => {
            inputSequence += e.key.toLowerCase();
            if (inputSequence.length > targetSequence.length) {
                inputSequence = inputSequence.substr(inputSequence.length - targetSequence.length);
            }

            if (inputSequence === targetSequence) {
                inputSequence = ""; 
                const userAttempt = prompt("Enter access credentials:");
                if (userAttempt === secretPassword) {
                    if (panel.style.display !== 'flex') {
                        panel.style.top = "25%";
                        panel.style.left = "calc(50% - 170px)";
                        panel.style.display = 'flex';
                    } else {
                        panel.style.display = 'none';
                    }
                }
            }
            if (e.key === "Escape") panel.style.display = 'none';
        });

        // --- DRAG SYSTEM ---
        const dragHandle = document.getElementById('panel-drag-handle');
        let isDragging = false, startX, startY, initialLeft, initialTop;

        dragHandle.addEventListener('mousedown', startDrag);
        dragHandle.addEventListener('touchstart', startDrag, { passive: true });

        function startDrag(e) {
            isDragging = true;
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            startX = clientX; startY = clientY;
            const rect = panel.getBoundingClientRect();
            initialLeft = rect.left; initialTop = rect.top;
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', stopDrag);
        }

        function dragMove(e) {
            if (!isDragging) return;
            const clientX = e.clientX; const clientY = e.clientY;
            panel.style.left = `${initialLeft + (clientX - startX)}px`;
            panel.style.top = `${initialTop + (clientY - startY)}px`;
        }

        function stopDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', dragMove); document.removeEventListener('mouseup', stopDrag);
        }

        // --- DICE LOGIC ---
        const diceIds = ['die-0', 'id-1', 'id-2', 'id-3'];
        let isRolling = false;

        function rollAllDice() {
            if (isRolling) return;
            isRolling = true;

            const forceValue = document.getElementById('force-select').value;
            const allowedOutcomes = diceOutcomes.filter(o => o.active);

            diceIds.forEach((id, index) => {
                const die = document.getElementById(id);
                const label = document.getElementById(`label-${index}`);
                die.classList.add('rolling');
                
                let shuffleInterval = setInterval(() => {
                    die.textContent = Math.floor(Math.random() * 6) + 1;
                }, 60);

                setTimeout(() => {
                    clearInterval(shuffleInterval);
                    die.classList.remove('rolling');
                    
                    let outcome = forceValue !== "random" ? diceOutcomes[parseInt(forceValue)] : allowedOutcomes[Math.floor(Math.random() * allowedOutcomes.length)];
                    
                    die.textContent = outcome.number;
                    die.style.backgroundColor = outcome.bg;
                    die.style.color = outcome.text;
                    label.textContent = outcome.name;

                    if (index === diceIds.length - 1) isRolling = false;
                }, 500 + (index * 80));
            });
        }
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
    </script>
</body>
</html>
