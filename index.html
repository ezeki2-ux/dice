<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Dice Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    
    <style>
        :root {
            --bg-body: #0a0a0c; --bg-panel: #141417; --bg-item: #1f1f24; --border-color: #2b2b33;
            --text-main: #ffffff; --text-muted: #71717a; --dice-bg: #1f1f24; --dice-border: #3f3f46;
            --button-bg: #ffffff; --button-text: #0a0a0c; --bg-opacity: 0.18; --accent-color: #ff0055;
        }

        body {
            font-family: 'Fredoka', system-ui, sans-serif;
            background-color: var(--bg-body); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .view-section { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; }
        .active-view { display: flex; }

        .elephant-wallpaper {
            position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background-image: url('https://i.postimg.co/6qLhMbyr/strawberry-elephant-transparent.png');
            background-size: 200px 200px; background-repeat: repeat; opacity: var(--bg-opacity); z-index: -1; pointer-events: none;
            animation: diagonalScroll 35s linear infinite;
        }
        @keyframes diagonalScroll { 0% { transform: translate(0, 0); } 100% { transform: translate(-200px, -200px); } }

        h1 { font-size: 2.2rem; margin-bottom: 5px; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); text-align: center;}
        
        .room-badge { background: #10b981; color: #000; font-weight: 700; padding: 6px 16px; border-radius: 20px; margin-bottom: 25px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
        
        .color-pool-label { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; font-weight: 700; }
        .color-pool { display: flex; gap: 12px; background: var(--bg-panel); padding: 14px 24px; border-radius: 40px; border: 3px solid var(--border-color); margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .pool-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 700; background: var(--bg-item); padding: 8px 16px; border-radius: 25px; border: 2px solid var(--border-color); }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
        
        .dice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; max-width: 380px; width: 100%; margin-bottom: 40px; }
        @media (min-width: 450px) { .dice-grid { grid-template-columns: repeat(4, 1fr); max-width: 680px; } }
        .die-box { display: flex; flex-direction: column; align-items: center; }
        .dice { width: 110px; height: 110px; background-color: var(--dice-bg); border: 4px solid var(--dice-border); border-radius: 35px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; color: var(--text-muted); box-shadow: 0 8px 0px rgba(0,0,0,0.4); transition: all 0.4s; user-select: none; }
        .die-label { margin-top: 12px; font-size: 1.1rem; font-weight: 700; min-height: 20px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .rolling { animation: bubbleTumble 0.5s ease-in-out; }
        @keyframes bubbleTumble { 0% { transform: scale(0.85) rotate(0deg); } 30% { transform: scale(1.2) rotate(-60deg); } 70% { transform: scale(1.1) rotate(420deg); } 100% { transform: scale(1) rotate(360deg); } }
        .roll-btn { padding: 18px 60px; font-size: 1.5rem; font-weight: 700; font-family: 'Fredoka', sans-serif; background: var(--button-bg); color: var(--button-text); border: 4px solid transparent; border-radius: 40px; cursor: pointer; box-shadow: 0 8px 0px rgba(0,0,0,0.4); }

        .remote-card { background: var(--bg-panel); border: 2px solid var(--border-color); border-radius: 20px; padding: 24px; width: 100%; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .remote-title { color: var(--accent-color); font-weight: 700; font-size: 1.4rem; text-transform: uppercase; margin-bottom: 20px; text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .control-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; width: 100%; }
        .control-label { color: var(--text-muted); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }
        .remote-select { background: var(--bg-item); color: #fff; border: 2px solid var(--accent-color); padding: 12px; border-radius: 10px; font-family: 'Fredoka', sans-serif; font-size: 1rem; width: 100%; outline: none; }
        
        .room-input-container { display: flex; gap: 10px; width: 100%; }
        .room-input { background: var(--bg-item); color: #fff; border: 2px solid var(--border-color); padding: 12px; border-radius: 10px; font-family: 'Fredoka', sans-serif; font-size: 1.1rem; font-weight:700; width: 100%; text-transform: uppercase; text-align: center; outline: none; }
        .room-connect-btn { background: #10b981; color: black; border: none; padding: 0 20px; font-weight: 700; border-radius: 10px; cursor: pointer; font-family: 'Fredoka', sans-serif; }
        
        .filter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
        .filter-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; background: var(--bg-item); border: 2px solid var(--border-color); border-radius: 12px; color: #fff; font-family: 'Fredoka', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.1s ease; }
        .filter-btn.blocked { opacity: 0.25; border-color: var(--accent-color); text-decoration: line-through; }
        .action-btn { width: 100%; padding: 16px; font-size: 1.2rem; font-weight: 700; border-radius: 12px; border: none; cursor: pointer; font-family: 'Fredoka', sans-serif; margin-top: 10px; transition: transform 0.1s; }
        .trigger-btn { background: var(--accent-color); color: white; box-shadow: 0 5px 0 #b3003b; }
        .trigger-btn:active { transform: translateY(4px); box-shadow: none; }
        .hidden-controls { display: none; width: 100%; flex-direction: column; }
    </style>
</head>
<body>

    <div class="elephant-wallpaper"></div>

    <div id="game-view" class="view-section">
        <h1>Color Dice Roller</h1>
        <div class="room-badge" id="room-display">Room: Loading...</div>
        
        <div class="color-pool-label">Possible Dice Results</div>
        <div class="color-pool" id="pool-legend"></div>
        
        <div class="dice-grid">
            <div class="die-box"><div class="dice" id="die-0">?</div><div class="die-label" id="label-0"></div></div>
            <div class="die-box"><div class="dice" id="id-1">?</div><div class="die-label" id="label-1"></div></div>
            <div class="die-box"><div class="dice" id="id-2">?</div><div class="die-label" id="label-2"></div></div>
            <div class="die-box"><div class="dice" id="id-3">?</div><div class="die-label" id="label-3"></div></div>
        </div>
        <button class="roll-btn" onclick="localRollTrigger()">Roll All</button>
    </div>

    <div id="remote-view" class="view-section">
        <div class="remote-card">
            <div class="remote-title">Targeted Rigger Command Center</div>
            
            <div class="control-row">
                <span class="control-label">Target Player Room Code:</span>
                <div class="room-input-container">
                    <input type="text" id="target-room-input" class="room-input" placeholder="e.g. A7B3" maxlength="4">
                    <button class="room-connect-btn" onclick="connectToTargetRoom()">Connect</button>
                </div>
            </div>

            <div id="active-controls" class="hidden-controls">
                <div class="control-row">
                    <span class="control-label">Force Outcome (Target Only):</span>
                    <select id="remote-force-select" class="remote-select" onchange="updateRemoteSettings()">
                        <option value="random">Disabled (Fair Random)</option>
                        <option value="0">Force Black (1)</option>
                        <option value="1">Force Blue (2)</option>
                        <option value="2">Force Green (3)</option>
                        <option value="3">Force Purple (4)</option>
                        <option value="4">Force Red (5)</option>
                        <option value="5">Force White (6)</option>
                    </select>
                </div>

                <div class="control-row">
                    <span class="control-label">Allowed Outcome Filters:</span>
                    <div class="filter-grid" id="remote-filter-grid"></div>
                </div>

                <button class="action-btn trigger-btn" onclick="sendRollCommand()">⚡ TRIGGER REMOTE ROLL</button>
            </div>
        </div>
    </div>

    <script>
        const diceOutcomes = [
            { number: 1, name: "Black", bg: "#1a1a24", text: "#ffffff", active: true },
            { number: 2, name: "Blue", bg: "#0070f3", text: "#ffffff", active: true },
            { number: 3, name: "Green", bg: "#00df61", text: "#0b0d16", active: true },
            { number: 4, name: "Purple", bg: "#7928ca", text: "#ffffff", active: true },
            { number: 5, name: "Red", bg: "#ff0055", text: "#ffffff", active: true },
            { number: 6, name: "White", bg: "#ffffff", text: "#0b0d16", active: true }
        ];

        let currentRigState = { forceValue: "random", allowedIndices: [0, 1, 2, 3, 4, 5] };
        let activeRoomId = "";

        const urlParams = new URLSearchParams(window.location.search);
        const isRemoteControl = urlParams.get('control') === 'true';

        // --- HARDENED WEB CONFIG ---
        const SUPABASE_URL = "https://sdzxiwctcsgvwsnpkcln.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jtGiCYw904YDKzsfKdTZnw_ruEw_OTn";
        let supabaseClient;
        let channel;

        if (window.supabase && typeof window.supabase.createClient === 'function') {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        if (isRemoteControl) {
            document.getElementById('remote-view').classList.add('active-view');
            setupRemoteInterface();
        } else {
            document.getElementById('game-view').classList.add('active-view');
            
            // Generate a random 4-letter/number code unique to this specific player tab
            activeRoomId = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('room-display').textContent = "Room Code: " + activeRoomId;
            
            setupGameInterface();
            listenToPrivateRoom(activeRoomId);
        }

        function setupGameInterface() {
            const legendContainer = document.getElementById('pool-legend');
            diceOutcomes.forEach(item => {
                const div = document.createElement('div');
                div.className = 'pool-item';
                div.innerHTML = `<span class="color-dot" style="background-color: ${item.bg};"></span> ${item.name}`;
                legendContainer.appendChild(div);
            });
        }

        function setupRemoteInterface() {
            const filterGrid = document.getElementById('remote-filter-grid');
            diceOutcomes.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.style.color = item.bg;
                btn.innerHTML = `<span class="color-dot" style="background-color: ${item.bg};"></span> ${item.name}`;
                btn.onclick = () => {
                    if (item.active && diceOutcomes.filter(o => o.active).length <= 1) return;
                    item.active = !item.active;
                    btn.classList.toggle('blocked', !item.active);
                    updateRemoteSettings();
                };
                filterGrid.appendChild(btn);
            });
        }

        // Connect the Game screen to its own private radio channel
        function listenToPrivateRoom(roomId) {
            if (supabaseClient) {
                channel = supabaseClient.channel('room-' + roomId, { config: { broadcast: { self: true } } });
                channel.on('broadcast', { event: 'rig_update' }, function(data) {
                    currentRigState = data.payload;
                }).on('broadcast', { event: 'trigger_roll' }, function() {
                    executeDiceRoll();
                }).subscribe();
            }
        }

        // On your phone, switch frequencies to match the player's room code
        function connectToTargetRoom() {
            const typedCode = document.getElementById('target-room-input').value.trim().toUpperCase();
            if(typedCode.length !== 4) {
                alert("Please enter a valid 4-character room code!");
                return;
            }

            if (channel) {
                channel.unsubscribe();
            }

            activeRoomId = typedCode;
            if (supabaseClient) {
                channel = supabaseClient.client.channel('room-' + activeRoomId, { config: { broadcast: { self: true } } });
                channel.subscribe((status) => {
                    if(status === 'SUBSCRIBED') {
                        document.getElementById('active-controls').style.display = 'flex';
                        updateRemoteSettings(); // sync settings to room
                    }
                });
            }
        }

        function updateRemoteSettings() {
            const forceSelectVal = document.getElementById('remote-force-select').value;
            const activeIndices = [];
            diceOutcomes.forEach((o, i) => { if (o.active) activeIndices.push(i); });

            if(channel) {
                channel.send({
                    type: 'broadcast',
                    event: 'rig_update',
                    payload: { forceValue: forceSelectVal, allowedIndices: activeIndices }
                });
            }
        }

        function sendRollCommand() {
            if(channel) {
                channel.send({ type: 'broadcast', event: 'trigger_roll', payload: {} });
            }
        }

        function localRollTrigger() {
            if(channel) {
                channel.send({ type: 'broadcast', event: 'trigger_roll', payload: {} });
            } else {
                executeDiceRoll();
            }
        }

        const diceIds = ['die-0', 'id-1', 'id-2', 'id-3'];
        let isRolling = false;

        function executeDiceRoll() {
            if (isRolling) return;
            isRolling = true;

            diceIds.forEach((id, index) => {
                const die = document.getElementById(id);
                const label = document.getElementById(`label-${index}`);
                if(!die) return;
                
                die.classList.add('rolling');
                let shuffleInterval = setInterval(() => {
                    die.textContent = Math.floor(Math.random() * 6) + 1;
                }, 60);

                setTimeout(() => {
                    clearInterval(shuffleInterval);
                    die.classList.remove('rolling');
                    
                    let outcome;
                    if (currentRigState.forceValue !== "random") {
                        outcome = diceOutcomes[parseInt(currentRigState.forceValue)];
                    } else {
                        const allowed = currentRigState.allowedIndices;
                        const randIndex = allowed[Math.floor(Math.random() * allowed.length)];
                        outcome = diceOutcomes[randIndex];
                    }
                    
                    die.textContent = outcome.number;
                    die.style.backgroundColor = outcome.bg;
                    die.style.color = outcome.text;
                    label.textContent = outcome.name;

                    if (index === diceIds.length - 1) isRolling = false;
                }, 500 + (index * 80));
            });
        }
    </script>
</body>
</html>
